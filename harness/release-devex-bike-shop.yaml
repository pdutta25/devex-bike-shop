                          echo "    <+pipeline.variables.repoUrl>/releases/tag/v1.0.<+pipeline.variables.buildNumber>"
                          echo ""
                          echo "  Live App (Production):"
                          echo "    https://www.devexbikeshop.com"
                          echo ""
