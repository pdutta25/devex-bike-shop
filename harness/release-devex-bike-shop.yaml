                          echo "    ↓"
                          echo "  AI Code Review / PR Description"
                          echo "    ↓"
                          echo "  CI — GitHub Actions (Run #<+pipeline.variables.buildNumber>)"
                          echo "    Build ✔  Lint ✔  Test ✔  Security ✔  Quality ✔"
                          echo "    ↓"
                          echo "  Release — v1.0.<+pipeline.variables.buildNumber>"
                          echo "    ↓"
                          echo "  CD — Harness Pipeline"
                          echo "    DEV   ✔  DB → Services‖UI → Smoke Tests"
                          echo "    SIT   ✔  DB → Services‖UI → Smoke + Integration"
                          echo "    PROD  ✔  DB → Services‖UI(Render) → Live Smoke"
                          echo "    ↓"
