pipeline:
  name: deploy-devex-bike-shop
  identifier: deploydevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # STAGE 1: DEV - Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Step 1: Provision DEV Infrastructure ──
              - step:
                  name: Provision DEV Infrastructure
                  identifier: Provision_DEV_Infrastructure
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "📋 Provisioning DEV — AWS EC2 via Terraform"
                          echo "   Region: us-east-1 | Instance: t3.medium"
                          sleep 2
                          echo "   Terraform init... ✔"
                          sleep 2
                          echo "   Terraform plan... 3 to add, 0 to change"
                          sleep 2
                          echo "   Terraform apply..."
                          sleep 3
                          echo "   ✔ aws_security_group.dev_web   created"
                          echo "   ✔ aws_instance.dev_bikeshop    created [i-0def1234abcd5678]"
                          echo "   ✔ aws_eip.dev_bikeshop         created"
                          sleep 2
                          echo "   ✔ Instance running | Status checks passed"
                          echo ""
                          echo "✅ DEV infrastructure provisioned"

              # ── Step 2: Deploy to DEV ──
              - step:
                  name: Deploy to DEV
                  identifier: Deploy_to_DEV
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🚀 Deploying to DEV (dev.bikeshop.internal)"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          sleep 2
                          echo "   Pulling artifact... ✔"
                          sleep 2
                          echo "   Deploying... ✔"
                          sleep 2
                          echo "   Restarting services... ✔"
                          echo ""
                          echo "✅ DEV deployed"

              # ── Step 3: DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests — dev.bikeshop.internal"
                          sleep 1
                          echo "   ✔ Homepage loads              (120ms)"
                          echo "   ✔ Static assets served        (85ms)"
                          echo "   ✔ Product catalog renders     (145ms)"
                          sleep 1
                          echo "   ✔ GET /health                 200 OK"
                          echo "   ✔ GET /api/products           200 OK"
                          echo "   ✔ GET /api/categories         200 OK"
                          sleep 1
                          echo "   ✔ Database connectivity       PASS"
                          echo "   ✔ Session store               PASS"
                          echo "   ✔ Environment config          PASS"
                          echo ""
                          echo "✅ DEV smoke tests passed — 9/9"

              # ── Step 4: Certify DEV Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ AUTO-CERTIFY: DEV Build
                      DEV deployment and smoke tests passed (11/11).
                      Auto-certifying to proceed to SIT.
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Step 5: DEV Summary ──
              - step:
                  name: DEV Summary
                  identifier: DEV_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV STAGE SUMMARY                │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Build:   #<+pipeline.variables.buildNumber>  │"
                          echo "│ Commit:  <+pipeline.variables.commitSha>     │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ ✅ Infrastructure Provisioned        │"
                          echo "│ ✅ Application Deployed              │"
                          echo "│ ✅ Smoke Tests Passed (11/11)        │"
                          echo "│ ✅ Build Certified                   │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Result:  ✅ DEV PASSED               │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # STAGE 2: SIT - Deploy and Certify (Manual Gates)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: SIT
        identifier: SIT
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Step 1: Deploy to SIT ──
              - step:
                  name: Deploy to SIT
                  identifier: Deploy_to_SIT
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🚀 Deploying to SIT (sit.bikeshop.internal)"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          sleep 2
                          echo "   Pulling artifact... ✔"
                          sleep 2
                          echo "   Deploying... ✔"
                          sleep 2
                          echo "   Configuring environment... ✔"
                          echo "   Restarting services... ✔"
                          echo ""
                          echo "✅ SIT deployed"

              # ── Step 2: SIT Smoke Tests ──
              - step:
                  name: SIT Smoke Tests
                  identifier: SIT_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 SIT Smoke Tests — sit.bikeshop.internal"
                          sleep 1
                          echo "   ✔ Homepage loads              (98ms)"
                          echo "   ✔ Static assets served        (72ms)"
                          echo "   ✔ Product catalog renders     (132ms)"
                          sleep 1
                          echo "   ✔ GET /health                 200 OK"
                          echo "   ✔ GET /api/products           200 OK"
                          echo "   ✔ GET /api/categories         200 OK"
                          sleep 1
                          echo "   ✔ Database connectivity       PASS"
                          echo "   ✔ Session store               PASS"
                          echo "   ✔ Environment config          PASS"
                          echo ""
                          echo "✅ SIT smoke tests passed — 9/9"

              # ── Step 3: SIT Integration Tests ──
              - step:
                  name: SIT Integration Tests
                  identifier: SIT_Integration_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 SIT Integration Tests — sit.bikeshop.internal"
                          sleep 1
                          echo "   ✔ Product API CRUD (4 tests)    PASS"
                          echo "   ✔ Cart operations (4 tests)     PASS"
                          echo "   ✔ Checkout flow E2E (3 tests)   PASS"
                          sleep 1
                          echo "   ✔ DB read/write consistency     PASS"
                          echo "   ✔ Session persistence           PASS"
                          echo "   ✔ Cache invalidation            PASS"
                          echo "   ✔ Error handling (404/500)      PASS"
                          sleep 1
                          echo "   ✔ Avg response:  67ms  (<200ms)"
                          echo "   ✔ P95 response:  142ms (<500ms)"
                          echo "   ✔ Throughput:    120rps (>50rps)"
                          echo "   ✔ Error rate:    0.0%  (<1%)"
                          echo ""
                          echo "✅ SIT integration + perf tests passed — 20/20"

              # ── Step 4: Certify SIT Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify SIT Build
                  identifier: Certify_SIT_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ AUTO-CERTIFY: SIT Build
                      SIT deployment completed successfully.
                         ✅ Smoke Tests:       11/11 passed
                         ✅ Integration Tests: 15/15 passed
                         ✅ Performance Tests: 5/5 passed
                      Auto-certifying to proceed to PROD.
                      Build:  #<+pipeline.variables.buildNumber>
                      Commit: <+pipeline.variables.commitSha>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Step 5: SIT Summary ──
              - step:
                  name: SIT Summary
                  identifier: SIT_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     SIT STAGE SUMMARY                │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Build:   #<+pipeline.variables.buildNumber>  │"
                          echo "│ Commit:  <+pipeline.variables.commitSha>     │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ ✅ Application Deployed              │"
                          echo "│ ✅ Smoke Tests Passed (11/11)        │"
                          echo "│ ✅ Integration Tests Passed (15/15)  │"
                          echo "│ ✅ Performance Tests Passed (5/5)    │"
                          echo "│ ✅ Build Certified                   │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Result:  ✅ SIT PASSED               │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # STAGE 3: PROD - Deploy and Certify (Manual + Real Deploy)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: PROD
        identifier: PROD
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Step 1: Approve Deploy to PROD (Auto-Approve in 10s) ──
              - step:
                  name: Approve Deploy to PROD
                  identifier: Approve_Deploy_to_PROD
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ AUTO-APPROVE: Deploy to PROD
                      Build #<+pipeline.variables.buildNumber> certified in DEV and SIT.
                      Commit: <+pipeline.variables.commitSha>
                      Auto-approving to proceed with PROD deployment.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Step 2: Deploy to PROD - Render ──
              - step:
                  name: Deploy to PROD - Render
                  identifier: Deploy_to_PROD_Render
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOYING TO PROD — RENDER          ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "Build:  #<+pipeline.variables.buildNumber>"
                          echo "Commit: <+pipeline.variables.commitSha>"
                          echo ""

                          APP_URL="<+secrets.getValue("render_app_url")>"
                          HEALTH_URL="${APP_URL}/api/health"

                          # ── Trigger Render Deploy Hook ──
                          echo "🚀 Triggering Render deployment..."
                          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
                            -X POST "<+secrets.getValue("render_deploy_hook_url")>" 2>/dev/null || echo "000")

                          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
                            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
                          else
                            echo "❌ Failed to trigger Render deploy (HTTP $RESPONSE)"
                            exit 1
                          fi

                          # ── Wait for Render deploy to complete ──
                          echo ""
                          echo "⏳ Waiting for Render deploy to complete..."
                          echo "─────────────────────────────────────"
                          TIMEOUT=300
                          INTERVAL=15
                          ELAPSED=0

                          while [ $ELAPSED -lt $TIMEOUT ]; do
                            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")

                            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                              if [ $ELAPSED -ge 60 ]; then
                                echo ""
                                echo "✅ App is live (HTTP $STATUS) after ~${ELAPSED}s"
                                break
                              else
                                echo "   [${ELAPSED}s] App responding (HTTP $STATUS) — waiting for deploy cycle..."
                              fi
                            else
                              echo "   [${ELAPSED}s] App restarting (HTTP $STATUS)..."
                            fi

                            sleep $INTERVAL
                            ELAPSED=$((ELAPSED + INTERVAL))
                          done

                          if [ $ELAPSED -ge $TIMEOUT ]; then
                            FINAL_STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")
                            if [ "$FINAL_STATUS" -ge 200 ] && [ "$FINAL_STATUS" -lt 400 ]; then
                              echo ""
                              echo "✅ App is live (HTTP $FINAL_STATUS) after timeout — proceeding"
                            else
                              echo ""
                              echo "❌ App not responding after ${TIMEOUT}s (HTTP $FINAL_STATUS)"
                              exit 1
                            fi
                          fi

                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│   PROD DEPLOYMENT COMPLETE           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Platform:     Render                 │"
                          echo "│ Deploy Time:  ~${ELAPSED}s           │"
                          echo "│ Health:       $HEALTH_URL            │"
                          echo "│ Status:       ✅ DEPLOYED            │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ Render deploy complete — proceeding to smoke tests"

              # ── Step 3: PROD Smoke Tests (Real) ──
              - step:
                  name: PROD Smoke Tests
                  identifier: PROD_Smoke_Tests
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║     PROD SMOKE TESTS (LIVE)          ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          APP_URL="<+secrets.getValue("render_app_url")>"
                          echo "Target: $APP_URL"
                          echo ""

                          PASSED=0
                          FAILED=0

                          smoke_test() {
                            local ID="$1"
                            local DESC="$2"
                            local URL="$3"
                            local EXPECT_STATUS="${4:-200}"
                            local MATCH_BODY="$5"

                            START_MS=$(($(date +%s%N 2>/dev/null || echo 0) / 1000000))
                            BODY=$(curl -s -L --max-time 15 "$URL")
                            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
                            END_MS=$(($(date +%s%N 2>/dev/null || echo 0) / 1000000))
                            DURATION=$((END_MS - START_MS))

                            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                              if [ -n "$MATCH_BODY" ]; then
                                if echo "$BODY" | grep -q "$MATCH_BODY"; then
                                  echo "   ✔ [$ID] $DESC — HTTP $STATUS (${DURATION}ms)"
                                  PASSED=$((PASSED + 1))
                                else
                                  echo "   ✘ [$ID] $DESC — HTTP $STATUS but body missing: $MATCH_BODY"
                                  FAILED=$((FAILED + 1))
                                fi
                              else
                                echo "   ✔ [$ID] $DESC — HTTP $STATUS (${DURATION}ms)"
                                PASSED=$((PASSED + 1))
                              fi
                            else
                              echo "   ✘ [$ID] $DESC — HTTP $STATUS (expected $EXPECT_STATUS)"
                              FAILED=$((FAILED + 1))
                            fi
                          }

                          echo "🔍 Health & Homepage"
                          echo "─────────────────────────────────────"
                          smoke_test "SMOKE-01" "GET /api/health" "$APP_URL/api/health" 200
                          smoke_test "SMOKE-02" "GET / (homepage)" "$APP_URL" 200 "__next"
                          echo ""

                          echo "🔍 Public API Endpoints"
                          echo "─────────────────────────────────────"
                          smoke_test "SMOKE-03" "GET /api/products" "$APP_URL/api/products" 200
                          smoke_test "SMOKE-04" "GET /api/categories" "$APP_URL/api/categories" 200
                          echo ""

                          echo "🔍 Storefront Pages"
                          echo "─────────────────────────────────────"
                          smoke_test "SMOKE-05" "GET /category/road" "$APP_URL/category/road" 200
                          smoke_test "SMOKE-06" "GET /cart" "$APP_URL/cart" 200
                          echo ""

                          TOTAL=$((PASSED + FAILED))
                          echo "┌──────────────────────────────────────┐"
                          echo "│     PROD SMOKE TEST RESULTS          │"
                          echo "├──────────────────────────────────────┤"
                          printf "│ Total Tests:    %-20s │\n" "$TOTAL"
                          printf "│ Passed:         %-20s │\n" "$PASSED"
                          printf "│ Failed:         %-20s │\n" "$FAILED"
                          printf "│ App URL:        %-20s │\n" "$APP_URL"
                          if [ "$FAILED" -eq 0 ]; then
                            echo "│ Status:         ✅ ALL PASSED        │"
                          else
                            echo "│ Status:         ❌ SOME FAILED       │"
                          fi
                          echo "└──────────────────────────────────────┘"
                          echo ""

                          if [ "$FAILED" -gt 0 ]; then
                            echo "❌ $FAILED smoke test(s) failed"
                            exit 1
                          fi
                          echo "✅ All $TOTAL PROD smoke tests passed — production is healthy"

              # ── Step 4: Certify PROD Build - Final Sign-Off (Auto-Approve in 10s) ──
              - step:
                  name: Certify PROD Build - Final Sign-Off
                  identifier: Certify_PROD_Build_Final_SignOff
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ AUTO-CERTIFY: PROD Build — Final Sign-Off
                      🎉 Production deployment successful!
                      Build:  #<+pipeline.variables.buildNumber>
                      Commit: <+pipeline.variables.commitSha>
                      App:    <+secrets.getValue("render_app_url")>
                      Auto-certifying to complete the release.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Step 5: Pipeline Summary ──
              - step:
                  name: Pipeline Summary
                  identifier: Pipeline_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════╗"
                          echo "║          PIPELINE EXECUTION SUMMARY                  ║"
                          echo "╠══════════════════════════════════════════════════════╣"
                          echo "║                                                      ║"
                          echo "║  Build:   #<+pipeline.variables.buildNumber>             ║"
                          echo "║  Commit:  <+pipeline.variables.commitSha>               ║"
                          echo "║  Branch:  <+pipeline.variables.branch>                  ║"
                          echo "║                                                      ║"
                          echo "╠══════════════════════════════════════════════════════╣"
                          echo "║  STAGE         STATUS                                ║"
                          echo "║  ─────         ──────                                ║"
                          echo "║  DEV           ✅ Provisioned → Deployed → Tested    ║"
                          echo "║  SIT           ✅ Deployed → Smoke + Integration     ║"
                          echo "║  PROD          ✅ Deployed to Render → Smoke (Live)  ║"
                          echo "╠══════════════════════════════════════════════════════╣"
                          echo "║                                                      ║"
                          echo "║  🎉 ALL STAGES PASSED — RELEASE COMPLETE             ║"
                          echo "║                                                      ║"
                          echo "║  App: <+secrets.getValue("render_app_url")>           ║"
                          echo "║                                                      ║"
                          echo "╚══════════════════════════════════════════════════════╝"
                          echo ""
        tags: {}
