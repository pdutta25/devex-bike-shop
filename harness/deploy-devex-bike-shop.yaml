pipeline:
  name: deploy-devex-bike-shop
  identifier: deploydevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  stages:
    # ════════════════════════════════════════════════════════════
    # STAGE 1: DEV - Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV - Deploy and Certify
        identifier: DEV_Deploy_and_Certify
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Step 1: Approve Deploy to DEV (Auto-Approve) ──
              - step:
                  name: Approve Deploy to DEV
                  identifier: Approve_Deploy_to_DEV
                  type: HarnessApproval
                  timeout: 1m
                  spec:
                    approvalMessage: |-
                      🔹 AUTO-APPROVE: Deploy to DEV
                      Build #<+trigger.payload.buildNumber>
                      Commit: <+trigger.payload.commitSha>
                      Branch: <+trigger.payload.branch>
                      This approval is auto-approved for DEV environment.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Step 2: Provision DEV Infrastructure ──
              - step:
                  name: Provision DEV Infrastructure
                  identifier: Provision_DEV_Infrastructure
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
