                          echo "║  Live App:                                           ║"
                          echo "║  <+secrets.getValue("render_app_url")>"
                          echo "║                                                      ║"
                          echo "╠══════════════════════════════════════════════════════╣"
                          echo "║                                                      ║"
                          echo "║  📊 DATA LINEAGE                                     ║"
