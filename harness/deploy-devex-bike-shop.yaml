                          echo "║  Commit <+pipeline.variables.commitSha> on branch <+pipeline.variables.branch>"
                          echo "║    → CI Build #<+pipeline.variables.buildNumber> (GitHub Actions)"
                          echo "║      → Security Scan (Trivy + npm audit)"
                          echo "║      → Code Quality (SonarCloud)"
