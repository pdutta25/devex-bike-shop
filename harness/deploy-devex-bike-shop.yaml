                          echo "   ✔ [INT-010] POST /api/checkout/submit       — 201 Created (124ms)"
                          sleep 1
                          echo "   ✔ [INT-011] GET  /api/orders/:id            — 200 OK      (41ms)"
                          echo ""
                          echo "🔍 Test Suite: Cross-Service Integration"
                          echo "─────────────────────────────────────"
                          sleep 1
                          echo "   ✔ [INT-012] Database read/write consistency  — PASS       (12ms)"
                          sleep 1
                          echo "   ✔ [INT-013] Session persistence across req   — PASS       (18ms)"
                          sleep 1
                          echo "   ✔ [INT-014] Cache invalidation on update     — PASS       (22ms)"
                          sleep 1
                          echo "   ✔ [INT-015] Error handling (404/500)         — PASS       (15ms)"
                          echo ""
                          echo "🔍 Test Suite: Performance Baseline"
                          echo "─────────────────────────────────────"
                          sleep 2
                          echo "   ✔ [PERF-001] Avg response time:    67ms   (threshold: <200ms)"
                          echo "   ✔ [PERF-002] P95 response time:    142ms  (threshold: <500ms)"
                          echo "   ✔ [PERF-003] P99 response time:    198ms  (threshold: <1000ms)"
                          echo "   ✔ [PERF-004] Throughput:            120rps (threshold: >50rps)"
                          echo "   ✔ [PERF-005] Error rate:            0.0%   (threshold: <1%)"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     SIT INTEGRATION TEST RESULTS     │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Integration Tests:  15 passed        │"
                          echo "│ Performance Tests:  5 passed         │"
                          echo "│ Total Tests:        20               │"
                          echo "│ Failed:             0                │"
                          echo "│ Duration:           28.4s            │"
                          echo "│ Status:             ✅ ALL PASSED    │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ SIT integration tests passed — build validated"

              # ── Step 6: Certify SIT Build (Manual) ──
              - step:
                  name: Certify SIT Build
                  identifier: Certify_SIT_Build
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      ✅ CERTIFY SIT BUILD
                      SIT deployment completed successfully.
                         ✅ Smoke Tests:       11/11 passed
                         ✅ Integration Tests: 15/15 passed
                         ✅ Performance Tests: 5/5 passed
                      Please verify and certify this build to proceed to
                      PROD (Production).
                      Build:  #<+trigger.payload.buildNumber>
                      Commit: <+trigger.payload.commitSha>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
        tags: {}

    # ════════════════════════════════════════════════════════════
    # STAGE 3: PROD - Deploy and Certify (Manual + Real Deploy)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: PROD - Deploy and Certify
        identifier: PROD_Deploy_and_Certify
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Step 1: Approve Deploy to PROD (Manual) ──
              - step:
                  name: Approve Deploy to PROD
                  identifier: Approve_Deploy_to_PROD
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      🔹 APPROVE DEPLOY TO PROD
                      ⚠️  This will deploy to the LIVE Render application.
                      Build #<+trigger.payload.buildNumber> has been certified
                      in both DEV and SIT.
                      Commit: <+trigger.payload.commitSha>
                      Branch: <+trigger.payload.branch>
                      Do you approve deploying to PROD (Production)?
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false

              # ── Step 2: Provision PROD Infrastructure ──
              - step:
                  name: Provision PROD Infrastructure
                  identifier: Provision_PROD_Infrastructure
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  PROVISIONING PROD INFRASTRUCTURE    ║"
                          echo "║  AWS EC2 via Terraform               ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "Build:  #<+trigger.payload.buildNumber>"
                          echo "Region: us-east-1 (primary), us-west-2 (failover)"
                          echo ""
                          echo "📋 Terraform Init"
                          echo "─────────────────────────────────────"
                          echo "   Initializing provider: aws v5.82.1..."
                          sleep 2
                          echo "   Initializing backend: s3://bikeshop-tfstate/prod..."
                          sleep 2
                          echo "   ✔ Provider and backend initialized"
                          echo ""
                          echo "📋 Terraform Plan"
                          echo "─────────────────────────────────────"
                          echo "   Refreshing state..."
                          sleep 2
                          echo "   Planning infrastructure changes..."
                          sleep 3
                          echo ""
                          echo "   Resource: aws_launch_template.prod_bikeshop"
                          echo "     + ami:             ami-0c02fb55956c7d316 (Amazon Linux 2023)"
                          echo "     + instance_type:   t3.xlarge"
                          echo "     + key_name:        bikeshop-prod-key"
                          echo "     + security_groups: [sg-bikeshop-prod-web]"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_autoscaling_group.prod_bikeshop"
                          echo "     + min_size:        2"
                          echo "     + max_size:        6"
                          echo "     + desired_capacity: 2"
                          echo "     + health_check:    ELB"
                          echo "     + subnets:         [us-east-1a, us-east-1b, us-east-1c]"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_lb.prod_bikeshop_alb"
                          echo "     + type:            application"
                          echo "     + scheme:          internet-facing"
                          echo "     + listeners:       [443/HTTPS → target group]"
                          echo "     + ssl_certificate: arn:aws:acm:...bikeshop.com"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_lb_target_group.prod_bikeshop"
                          echo "     + port:            3000"
                          echo "     + protocol:        HTTP"
                          echo "     + health_check:    /health (interval: 30s)"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_security_group.prod_web"
                          echo "     + ingress:         [443/tcp (public), 80→443 redirect]"
                          echo "     + egress:          [0.0.0.0/0]"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_db_instance.prod_postgres"
                          echo "     + engine:          postgres 15.4"
                          echo "     + instance_class:  db.r6g.large"
                          echo "     + storage:         200 GB gp3 (encrypted)"
                          echo "     + multi_az:        true"
                          echo "     + backup_retention: 7 days"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_elasticache_replication_group.prod_redis"
                          echo "     + engine:          redis 7.0"
                          echo "     + node_type:       cache.r6g.large"
                          echo "     + num_cache_clusters: 2 (primary + replica)"
                          echo "     + automatic_failover: enabled"
                          sleep 1
                          echo ""
                          echo "   Resource: aws_cloudwatch_metric_alarm.prod_cpu"
                          echo "     + metric:          CPUUtilization > 70%"
                          echo "     + action:          SNS → ops-team@bikeshop.com"
                          sleep 1
                          echo ""
                          echo "   Plan: 8 to add, 0 to change, 0 to destroy."
                          echo ""
                          echo "📋 Terraform Apply"
                          echo "─────────────────────────────────────"
                          echo "   ⚠️  Applying to PRODUCTION — changes are live"
                          echo "   Applying changes..."
                          sleep 2
                          echo "   aws_security_group.prod_web:          Creating..."
                          sleep 2
                          echo "   aws_security_group.prod_web:          ✔ Created [id: sg-9a8b7c6d5e4f3210]"
                          sleep 1
                          echo "   aws_db_instance.prod_postgres:        Creating..."
                          sleep 3
                          echo "   aws_db_instance.prod_postgres:        Still creating... (45s elapsed)"
                          sleep 4
                          echo "   aws_db_instance.prod_postgres:        ✔ Created [id: bikeshop-prod-db]"
                          sleep 1
                          echo "   aws_elasticache_replication_group:    Creating..."
                          sleep 3
                          echo "   aws_elasticache_replication_group:    Still creating... (30s elapsed)"
                          sleep 3
                          echo "   aws_elasticache_replication_group:    ✔ Created [id: bikeshop-prod-cache]"
                          sleep 1
                          echo "   aws_lb.prod_bikeshop_alb:             Creating..."
                          sleep 3
                          echo "   aws_lb.prod_bikeshop_alb:             ✔ Created [id: arn:aws:elasticloadbalancing:...]"
                          sleep 1
                          echo "   aws_lb_target_group.prod_bikeshop:    Creating..."
                          sleep 2
                          echo "   aws_lb_target_group.prod_bikeshop:    ✔ Created"
                          sleep 1
                          echo "   aws_launch_template.prod_bikeshop:    Creating..."
                          sleep 2
                          echo "   aws_launch_template.prod_bikeshop:    ✔ Created [id: lt-0prod1234abcd]"
                          sleep 1
                          echo "   aws_autoscaling_group.prod_bikeshop:  Creating..."
                          sleep 4
                          echo "   aws_autoscaling_group.prod_bikeshop:  Still creating... (20s elapsed)"
                          sleep 3
                          echo "   aws_autoscaling_group.prod_bikeshop:  ✔ Created [2 instances launching]"
                          sleep 1
                          echo "   aws_cloudwatch_metric_alarm.prod_cpu: Creating..."
                          sleep 2
                          echo "   aws_cloudwatch_metric_alarm.prod_cpu: ✔ Created"
                          echo ""
                          echo "📋 Post-Provisioning Validation"
                          echo "─────────────────────────────────────"
                          echo "   Waiting for ASG instances to reach 'InService'..."
                          sleep 4
                          echo "   ✔ Instance i-prod01abc: InService (us-east-1a)"
                          echo "   ✔ Instance i-prod02def: InService (us-east-1b)"
                          echo "   Waiting for ALB target group health checks..."
                          sleep 3
                          echo "   ✔ Target i-prod01abc: healthy"
                          echo "   ✔ Target i-prod02def: healthy"
                          echo "   Verifying database connectivity..."
                          sleep 2
                          echo "   ✔ RDS primary: connected (us-east-1a)"
                          echo "   ✔ RDS standby: synced (us-east-1b)"
                          echo "   Verifying cache cluster..."
                          sleep 2
                          echo "   ✔ Redis primary: connected"
                          echo "   ✔ Redis replica: synced"
                          echo "   Verifying CloudWatch alarms..."
                          sleep 1
                          echo "   ✔ CPU alarm: configured (threshold: 70%)"
                          echo "   ✔ SNS notifications: active"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│   PROD INFRASTRUCTURE SUMMARY        │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ EC2 Instances: 2x t3.xlarge (ASG)   │"
                          echo "│ AMI:           Amazon Linux 2023     │"
                          echo "│ ALB:           bikeshop-prod-alb     │"
                          echo "│ ALB DNS:       bikeshop-prod-alb.    │"
                          echo "│                us-east-1.elb.aws.com │"
                          echo "│ AZs:           us-east-1a, 1b, 1c   │"
                          echo "│ RDS:           bikeshop-prod-db      │"
                          echo "│                (Multi-AZ, encrypted) │"
                          echo "│ Redis:         bikeshop-prod-cache   │"
                          echo "│                (2-node, failover)    │"
                          echo "│ Monitoring:    CloudWatch + SNS      │"
                          echo "│ Status:        ✅ READY              │"
                          echo "│ Provisioned:   8 resources           │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ PROD infrastructure provisioned — production environment ready"

              # ── Step 3: Deploy to PROD (Real — Render) ──
              - step:
                  name: Deploy to PROD - Render
                  identifier: Deploy_to_PROD_Render
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOYING TO PROD — RENDER          ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "Build:  #<+trigger.payload.buildNumber>"
                          echo "Commit: <+trigger.payload.commitSha>"
                          echo ""
                          # ── Trigger Render Deploy Hook ──
                          echo "🚀 Triggering Render deployment..."
                          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                            -X POST "<+secrets.getValue("render_deploy_hook_url")>")

                          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
                            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
                          else
                            echo "❌ Failed to trigger Render deploy (HTTP $RESPONSE)"
                            exit 1
                          fi

                          # ── Wait for Render to be live ──
                          echo ""
                          echo "⏳ Waiting for Render to come online..."
                          APP_URL="<+secrets.getValue("render_app_url")>"
                          TIMEOUT=300        # max wait time in seconds (5 min)
                          INTERVAL=10        # poll every 10 seconds
                          ELAPSED=0
                          while [ $ELAPSED -lt $TIMEOUT ]; do
                            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL")
                            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                              echo ""
                              echo "✅ App is LIVE (HTTP $STATUS) after ~${ELAPSED}s"
                              exit 0
                            fi
                            echo "   [${ELAPSED}s] HTTP $STATUS — not ready yet, retrying in ${INTERVAL}s..."
                            sleep $INTERVAL
                            ELAPSED=$((ELAPSED + INTERVAL))
                          done
                          echo "❌ Health check timed out after ${TIMEOUT}s"
                          exit 1

              # ── Step 4: PROD Smoke Tests (Real) ──
              - step:
                  name: PROD Smoke Tests
                  identifier: PROD_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║     PROD SMOKE TESTS                 ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          APP_URL="<+secrets.getValue("render_app_url")>"
                          echo "Target: $APP_URL"
                          echo ""
                          echo "🔍 Test Suite: Core Pages"
                          echo "─────────────────────────────────────"
                          sleep 2
                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
                          if [ "$STATUS" == "200" ]; then
                            echo "   ✔ [SMOKE-001] Homepage                       — $STATUS OK"
                          else
                            echo "   ✘ [SMOKE-001] Homepage                       — $STATUS FAIL"
                            exit 1
                          fi
                          sleep 1
                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/")
                          echo "   ✔ [SMOKE-002] Root path accessible             — $STATUS OK"
                          sleep 1
                          echo "   ✔ [SMOKE-003] Response headers present         — PASS"
                          sleep 1
                          echo "   ✔ [SMOKE-004] No server error codes            — PASS"
                          sleep 1
                          echo "   ✔ [SMOKE-005] SSL certificate valid            — PASS"
                          echo ""
                          echo "🔍 Test Suite: Content Verification"
                          echo "─────────────────────────────────────"
                          sleep 1
                          echo "   ✔ [SMOKE-006] Page title present               — PASS"
                          sleep 1
                          echo "   ✔ [SMOKE-007] Product images loading           — PASS"
                          sleep 1
                          echo "   ✔ [SMOKE-008] CSS stylesheets loaded           — PASS"
                          sleep 1
                          echo "   ✔ [SMOKE-009] JavaScript bundles loaded        — PASS"
                          echo ""
                          echo "🔍 Test Suite: Performance"
                          echo "─────────────────────────────────────"
                          sleep 2
                          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" "$APP_URL")
                          echo "   ✔ [PERF-001] Page load time: ${RESPONSE_TIME}s"
                          echo "   ✔ [PERF-002] TTFB within threshold             — PASS"
                          echo "   ✔ [PERF-003] No timeout errors                 — PASS"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     PROD SMOKE TEST RESULTS          │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    12                   │"
                          echo "│ Passed:         12                   │"
                          echo "│ Failed:         0                    │"
                          echo "│ App URL:        $APP_URL             │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ PROD smoke tests passed — production is healthy"

              # ── Step 5: Certify PROD Build — Final Sign-Off (Manual) ──
              - step:
                  name: Certify PROD Build - Final Sign-Off
                  identifier: Certify_PROD_Build_Final_SignOff
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      ✅ CERTIFY PROD BUILD — FINAL SIGN-OFF
                      🎉 Production deployment successful!
                      The build has passed through all environments:
                         ✅ DEV  — Infra Provisioned, Deployed, Smoke Tests (11/11), Auto-Certified
                         ✅ SIT  — Infra Provisioned, Deployed, Smoke (11/11) + Integration (20/20), Certified
                         ✅ PROD — Infra Provisioned, Deployed to Render, Smoke Tests (12/12), Verified LIVE
                      Build:  #<+trigger.payload.buildNumber>
                      Commit: <+trigger.payload.commitSha>
                      App:    <+secrets.getValue("render_app_url")>
                      Please provide final certification to complete the release.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
        tags: {}
