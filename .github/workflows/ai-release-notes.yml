name: AI Release Notes

on:
  push:
    branches: [main]

jobs:
  release-notes:
    name: 📝 AI Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather code changes
        run: |
          # Find comparison point: last tag or ~10 commits back
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            BASE="$LAST_TAG"
          else
            BASE="HEAD~10"
          fi

          # Commit messages for context
          git log "$BASE"..HEAD --pretty=format:"- %s (%h)" --no-merges | head -20 > /tmp/commits.txt

          # Actual code diff (truncated to fit token budget)
          git diff "$BASE"..HEAD --stat > /tmp/diff_stat.txt
          git diff "$BASE"..HEAD -- '*.ts' '*.tsx' '*.yml' '*.json' \
            ':!package-lock.json' ':!*.test.*' \
            | head -300 > /tmp/diff.txt

          echo "BASE=$BASE" > /tmp/meta.txt
          echo "COMMITS=$(wc -l < /tmp/commits.txt | tr -d ' ')" >> /tmp/meta.txt
          echo "FILES_CHANGED=$(wc -l < /tmp/diff_stat.txt | tr -d ' ')" >> /tmp/meta.txt

      - name: Generate plain-English release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          DIFF_STAT=$(cat /tmp/diff_stat.txt | tail -1)
          DIFF=$(cat /tmp/diff.txt | head -c 5000)

          PROMPT=$(cat <<PROMPT_END
          Here are the commit messages:
          $COMMITS

          Summary: $DIFF_STAT

          Here is the actual code diff:
          \`\`\`
          $DIFF
          \`\`\`

          Write release notes explaining what actually changed in the code in plain English.
          PROMPT_END
          )

          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role: "system", content: "You write release notes for a business audience. Use this exact template:\n\n## 🚀 What'\''s New\n(New features or capabilities added)\n\n## 🔄 What Changed\n(Improvements or updates to existing functionality)\n\n## 🐛 What'\''s Fixed\n(Bug fixes and resolved issues)\n\n## 📝 In a nutshell\n(One plain-English sentence anyone on the team can understand)\n\nWrite in plain English. Describe WHAT changed and WHY it matters — not file names or commit hashes. If a section has no changes, write NA. Keep each bullet to one line."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 2000
              }')")

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Failed to generate notes"')

          VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          echo "$VERSION" > /tmp/version.txt
          echo "$NOTES" > /tmp/notes.txt

          echo "📝 Generated release notes for $VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat /tmp/version.txt)
          NOTES=$(cat /tmp/notes.txt)

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" || echo "⚠️ Release creation skipped (may already exist)"

          echo "✅ Release $VERSION created"
