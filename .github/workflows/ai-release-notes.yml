name: AI Release Notes

on:
  push:
    branches: [main]

jobs:
  release-notes:
    name: 📝 AI Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather commit history
        id: commits
        run: |
          # Get commits since last tag (or last 20 if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30)
            RANGE="$LAST_TAG → HEAD"
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
            RANGE="last 20 commits"
          fi

          # Get changed files summary
          if [ -n "$LAST_TAG" ]; then
            FILES=$(git diff --stat "$LAST_TAG"..HEAD | tail -1)
          else
            FILES=$(git diff --stat HEAD~20..HEAD 2>/dev/null | tail -1 || echo "multiple files changed")
          fi

          # Save to file (avoids multiline env var issues)
          echo "$COMMITS" > /tmp/commits.txt
          echo "$RANGE" > /tmp/range.txt
          echo "$FILES" > /tmp/files.txt

      - name: Generate release notes with AI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          RANGE=$(cat /tmp/range.txt)
          FILES=$(cat /tmp/files.txt)

          PROMPT="Generate concise release notes for a bike shop e-commerce app. Group changes by category (Features, Fixes, Security, CI/CD, Docs). Use emoji prefixes. Keep it short.\n\nCommit range: $RANGE\nFiles: $FILES\n\nCommits:\n$COMMITS"

          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role: "system", content: "You are a release notes writer. Write clean markdown release notes. No title — start with categories directly. Be concise."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 1500
              }')")

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Failed to generate notes"')

          # Create version tag based on date
          VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          echo "$VERSION" > /tmp/version.txt
          echo "$NOTES" > /tmp/notes.txt

          echo "📝 Generated release notes for $VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat /tmp/version.txt)
          NOTES=$(cat /tmp/notes.txt)

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" || echo "⚠️ Release creation skipped (may already exist)"

          echo "✅ Release $VERSION created"
