name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/dependabot.yml'

# Only one review per PR at a time
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/diff.txt 2>/dev/null || \
            git diff origin/"$PR_BASE_REF"...HEAD > /tmp/diff.txt

          # Truncate to stay within token limits
          head -c 6000 /tmp/diff.txt > /tmp/diff_trimmed.txt

          # Get PR info
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "Files changed: $(wc -l < /tmp/diff.txt) diff lines" > /tmp/pr_meta.txt

      - name: Generate AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(cat /tmp/diff_trimmed.txt)
          TITLE=$(cat /tmp/pr_title.txt)
          META=$(cat /tmp/pr_meta.txt)

          PROMPT="Review this PR for a Next.js e-commerce app.\n\nPR: $TITLE\n$META\n\nDiff:\n\`\`\`\n$DIFF\n\`\`\`"

          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role: "system", content: "You are a senior code reviewer. Provide a brief review with: 1) Summary (1-2 sentences), 2) Key Changes (bullet list), 3) Potential Issues (if any), 4) Security Notes (if relevant). Use emoji. Keep it concise. End with an overall assessment: ✅ LGTM, ⚠️ Minor issues, or 🚨 Needs attention."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 1500
              }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Unable to generate review"')
          echo "$REVIEW" > /tmp/review.txt

      - name: Post review comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review.txt)
          COMMENT="## 🤖 AI Code Review\n\n$REVIEW\n\n---\n*Generated by GitHub Models API (gpt-4o-mini)*"

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(echo -e "$COMMENT")"

          echo "✅ AI review posted to PR #${{ github.event.pull_request.number }}"
