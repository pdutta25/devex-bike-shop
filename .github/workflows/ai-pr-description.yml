name: AI PR Description

on:
  pull_request:
    types: [opened]

# Only one description generation per PR at a time
concurrency:
  group: ai-desc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-description:
    name: 📝 AI PR Description
    runs-on: ubuntu-latest
    # Skip if the PR body is already filled in
    if: github.event.pull_request.body == '' || github.event.pull_request.body == null
    permissions:
      contents: read
      pull-requests: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Get the diff
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/diff.txt 2>/dev/null || \
            git diff origin/"$PR_BASE_REF"...HEAD > /tmp/diff.txt

          # Truncate diff to stay within token limits
          head -c 8000 /tmp/diff.txt > /tmp/diff_trimmed.txt

          # Get commit messages on this branch
          git log origin/"$PR_BASE_REF"..HEAD --pretty=format:"- %s" > /tmp/commits.txt

          # Get list of changed files
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/files.txt 2>/dev/null || \
            git diff origin/"$PR_BASE_REF"...HEAD --name-only > /tmp/files.txt

      - name: Generate PR description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(cat /tmp/diff_trimmed.txt)
          COMMITS=$(cat /tmp/commits.txt)
          FILES=$(cat /tmp/files.txt)
          TITLE="$PR_TITLE"

          PROMPT="Generate a PR description for this pull request.\n\nPR Title: $TITLE\n\nCommits:\n$COMMITS\n\nFiles changed:\n$FILES\n\nDiff:\n\`\`\`\n$DIFF\n\`\`\`"

          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role: "system", content: "You are a helpful assistant that writes clear, concise pull request descriptions. Given the PR title, commits, changed files, and diff, generate a PR body in this exact format:\n\n## Summary\n<2-3 sentence overview of what this PR does and why>\n\n## Changes\n<bulleted list of key changes, grouped logically>\n\n## Testing\n<brief note on how to test or verify these changes>\n\nKeep it concise and professional. Use emoji sparingly. Do not wrap the output in markdown code fences."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 1500
              }')")

          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Unable to generate description"')
          echo "$DESCRIPTION" > /tmp/description.txt

      - name: Update PR description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DESCRIPTION=$(cat /tmp/description.txt)
          FOOTER="\n\n---\n*🤖 Auto-generated by GitHub Models API (gpt-4o-mini)*"
          BODY="${DESCRIPTION}${FOOTER}"

          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$(echo -e "$BODY")"

          echo "✅ PR description updated for PR #${{ github.event.pull_request.number }}"
