name: AI Incident Summary

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  incident:
    name: 🚨 AI Incident Summary
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gather failure context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"

          # Get failed jobs
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | "\(.name): \(.conclusion) — step: \(.steps[] | select(.conclusion == "failure") | .name)"' 2>/dev/null \
            || echo "Unknown job failure")

          # Get logs snippet from failed jobs (last 50 lines of each failed job)
          LOGS=""
          FAILED_JOB_IDS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .id' 2>/dev/null || echo "")

          for JOB_ID in $FAILED_JOB_IDS; do
            JOB_LOG=$(gh api "repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" 2>/dev/null | tail -30 || echo "Logs unavailable")
            LOGS="$LOGS\n--- Job $JOB_ID ---\n$JOB_LOG"
          done

          # Get recent commit messages
          RECENT=$(git log --oneline -5 2>/dev/null || echo "No commits available")

          # Get changed files in the failing commit
          CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null | head -15 || echo "Unknown")

          cat > /tmp/incident_context.txt << CONTEXT
          Pipeline: CI
          Run: #$RUN_ID
          Branch: $BRANCH
          Commit: ${COMMIT:0:7}
          Triggered by: $ACTOR

          Failed jobs:
          $JOBS

          Recent commits:
          $RECENT

          Files changed:
          $CHANGED

          Error logs (truncated):
          $(echo -e "$LOGS" | head -60)
          CONTEXT

      - name: Generate incident summary with AI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTEXT=$(cat /tmp/incident_context.txt | head -c 4000)

          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --arg prompt "Analyze this CI pipeline failure and generate an incident summary:\n\n$CONTEXT" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {role: "system", content: "You are an SRE analyzing a CI pipeline failure. Generate a structured incident report with: 1) 🔍 Summary (1-2 sentences), 2) 🎯 Root Cause (likely cause based on logs and changed files), 3) 💥 Impact (what is affected), 4) 🔧 Suggested Actions (2-3 actionable steps to fix), 5) 📊 Severity (Critical/High/Medium/Low). Be concise and actionable."},
                  {role: "user", content: $prompt}
                ],
                temperature: 0.3,
                max_tokens: 1500
              }')")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Unable to generate incident summary"')
          echo "$SUMMARY" > /tmp/summary.txt

      - name: Create incident issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(cat /tmp/summary.txt)
          RUN_ID="${{ github.event.workflow_run.id }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"

          BODY="## 🚨 CI Pipeline Failure — Automated Incident Report

          **Pipeline Run:** [#$RUN_ID]($RUN_URL)
          **Commit:** \`${COMMIT:0:7}\`
          **Branch:** \`${{ github.event.workflow_run.head_branch }}\`
          **Triggered by:** @${{ github.event.workflow_run.actor.login }}

          ---

          $SUMMARY

          ---

          > 🤖 *Auto-generated by AI Incident Summary (GitHub Models API)*
          > Review the [full pipeline logs]($RUN_URL) for details."

          gh issue create \
            --title "🚨 CI Failure: $(date +%Y-%m-%d) — ${COMMIT:0:7}" \
            --body "$(echo -e "$BODY")" \
            --label "incident,automated" || {
              # Labels might not exist, try without
              gh issue create \
                --title "🚨 CI Failure: $(date +%Y-%m-%d) — ${COMMIT:0:7}" \
                --body "$(echo -e "$BODY")"
            }

          echo "✅ Incident issue created"
