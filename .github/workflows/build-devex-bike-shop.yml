name: CI-CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      test_deploy:
        description: 'Force deploy step (for testing)'
        type: boolean
        default: false

# Cancel in-progress runs for the same branch (saves runner minutes on rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════
# PIPELINE GRAPH (visible in GitHub Actions UI):
#
#   build ──┐
#   lint  ──┤──→ security-scan ──┐
#   test  ──┤──→ code-quality  ──┤──→ deploy-gate
#           └────────────────────┘
#
# Docs generation runs independently after build (main only).
# ═══════════════════════════════════════════════════════════

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1a: BUILD (runs in parallel with lint & test)
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build (Next.js)
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       BUILD                          ║"
          echo "╚══════════════════════════════════════╝"
          npm run build
          echo "✅ Build completed successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # STAGE 1b: LINT (runs in parallel with build & test)
  # ─────────────────────────────────────────────
  lint:
    name: 📋 Lint (ESLint)
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       LINTING — ESLint Check         ║"
          echo "╚══════════════════════════════════════╝"
          npx next lint --no-cache 2>&1 | tee /tmp/lint-output.txt
          LINT_EXIT=${PIPESTATUS[0]}
          echo ""
          if [ "$LINT_EXIT" -eq 0 ]; then
            echo "✅ Linting passed — no issues found"
          else
            echo "⚠️  Lint issues found (non-blocking for demo)"
            echo "   Exit code: $LINT_EXIT"
          fi

  # ─────────────────────────────────────────────
  # STAGE 1c: TEST (runs in parallel with build & lint)
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test (Vitest)
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       UNIT TESTING (Vitest)          ║"
          echo "╚══════════════════════════════════════╝"
          npm test
          echo "✅ Unit tests passed"

  # ─────────────────────────────────────────────
  # STAGE 2a: SECURITY SCAN (after build passes)
  # ─────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan (Trivy + npm audit)
    needs: [build]
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency Vulnerability Check (npm audit)
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  DEPENDENCY VULNERABILITY CHECK      ║"
          echo "║  (npm audit)                         ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          npm audit --omit=dev 2>&1 || true
          echo ""
          echo "✅ npm audit completed"

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # ─────────────────────────────────────────────
  # STAGE 2b: CODE QUALITY (after build passes)
  # ─────────────────────────────────────────────
  code-quality:
    name: 📊 Code Quality (SonarCloud)
    needs: [build]
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/
            -Dsonar.exclusions=**/node_modules/**,**/__tests__/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ─────────────────────────────────────────────
  # STAGE 3: DEPLOY GATE (all checks must pass)
  # ─────────────────────────────────────────────
  deploy-gate:
    name: 🚀 Deploy (Harness)
    needs: [build, lint, test, security-scan, code-quality]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: CI Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║         CI PIPELINE SUMMARY          ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ ✅ Build            — Passed         ║"
          echo "║ ✅ Linting          — Passed         ║"
          echo "║ ✅ Unit Tests       — Passed (Vitest) ║"
          echo "║ ✅ Security Scan    — Passed (Trivy)  ║"
          echo "║ ✅ Code Quality     — Passed (Sonar)  ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ Commit: ${{ github.sha }}            ║"
          echo "║ Branch: ${{ github.ref_name }}       ║"
          echo "║ Build:  #${{ github.run_number }}    ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 🚀 Ready for deployment via Harness  ║"
          echo "╚══════════════════════════════════════╝"

      - name: Checkout code
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || inputs.test_deploy == true
        uses: actions/checkout@v4

      - name: Deploy via Harness CD Pipeline
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || inputs.test_deploy == true
        env:
          HARNESS_API_KEY: ${{ secrets.HARNESS_API_KEY }}
          HARNESS_ACCOUNT_ID: ${{ secrets.HARNESS_ACCOUNT_ID }}
          HARNESS_ORG_ID: ${{ secrets.HARNESS_ORG_ID }}
          HARNESS_PROJECT_ID: ${{ secrets.HARNESS_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_RUN: ${{ github.run_number }}
          GIT_RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PIPELINE_ID="deploydevexbikeshop"
          SHORT_SHA="${GIT_SHA:0:7}"
          BASE_URL="https://app.harness.io/pipeline/api"
          SCOPE="accountIdentifier=${HARNESS_ACCOUNT_ID}&orgIdentifier=${HARNESS_ORG_ID}&projectIdentifier=${HARNESS_PROJECT_ID}"

          # Extract PR number from merge commit message (e.g. "Merge pull request #42 from ...")
          PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K[0-9]+' || echo "")

          # Build execution name for traceability
          if [ -n "$PR_NUM" ]; then
            EXEC_NAME="PR${PR_NUM}-${SHORT_SHA}-${GIT_RUN}"
          else
            EXEC_NAME="${SHORT_SHA}-${GIT_RUN}"
          fi

          # Step 1: Ensure pipeline exists (create if missing, skip if exists)
          echo "📋 Ensuring pipeline exists..."
          YAML=$(cat harness/deploy-devex-bike-shop.yaml)
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipelines/v2?${SCOPE}" \
            -H "Content-Type: application/yaml" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$YAML")

          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "✅ Pipeline created"
          elif [ "$CREATE_CODE" -eq 409 ] || ([ "$CREATE_CODE" -eq 400 ] && echo "$CREATE_RESPONSE" | grep -q "DUPLICATE_FIELD"); then
            echo "✅ Pipeline already exists"
          else
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            echo "❌ Failed to ensure pipeline (HTTP $CREATE_CODE)"
            echo "   Response: $CREATE_BODY"
            exit 1
          fi

          # Step 2: Execute pipeline with tags for traceability
          echo ""
          echo "▶️  Executing pipeline: $EXEC_NAME"
          PAYLOAD=$(jq -n \
            --arg name "$EXEC_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg pr "${PR_NUM:-none}" \
            --arg build "$GIT_RUN" \
            --arg branch "$GIT_BRANCH" \
            --arg repo "$REPO_URL" \
            --arg runid "$GIT_RUN_ID" \
            '{
              notesForPipelineExecution: ("Triggered by GitHub Actions | Run #" + $build + " | Branch: " + $branch + " | Commit: " + $sha),
              pipeline: {
                identifier: "deploydevexbikeshop",
                tags: {
                  commitSha: $sha,
                  prNumber: $pr,
                  buildNumber: $build,
                  branch: $branch,
                  executionName: $name
                },
                variables: [
                  { name: "commitSha", type: "String", value: $sha },
                  { name: "buildNumber", type: "String", value: $build },
                  { name: "branch", type: "String", value: $branch },
                  { name: "prNumber", type: "String", value: $pr },
                  { name: "triggeredBy", type: "String", value: "GitHub Actions" },
                  { name: "repoUrl", type: "String", value: $repo },
                  { name: "runId", type: "String", value: $runid }
                ]
              }
            }')

          EXEC_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipeline/execute/${PIPELINE_ID}?${SCOPE}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$PAYLOAD")

          EXEC_CODE=$(echo "$EXEC_RESPONSE" | tail -1)
          EXEC_BODY=$(echo "$EXEC_RESPONSE" | head -n -1)
          echo ""
          if [ "$EXEC_CODE" -ge 200 ] && [ "$EXEC_CODE" -lt 300 ]; then
            EXEC_ID=$(echo "$EXEC_BODY" | jq -r '.data.planExecution.uuid // "unknown"')
            echo "✅ Pipeline executing (HTTP $EXEC_CODE)"
            echo "   Execution: $EXEC_NAME"
            echo "   PR: ${PR_NUM:-N/A}"
            echo "   Commit: $SHORT_SHA"
            echo "   ID: $EXEC_ID"
          else
            echo "⚠️  Harness execute returned HTTP $EXEC_CODE (non-blocking)"
            echo "   Response: $EXEC_BODY"
          fi

      - name: Create GitHub Release
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || inputs.test_deploy == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "📦 Creating release: $TAG"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$(cat <<NOTES
          ## Release $TAG

          **Commit:** $SHORT_SHA
          **Branch:** ${{ github.ref_name }}
          **Build:** #${{ github.run_number }}

          ### CI Checks
          - ✅ Build (Next.js)
          - ✅ Lint (ESLint)
          - ✅ Test (Vitest)
          - ✅ Security Scan (Trivy + npm audit)
          - ✅ Code Quality (SonarCloud)

          ### Deployment
          Deployed via Harness CD pipeline → DEV → SIT → PROD
          NOTES
          )" \
            --target ${{ github.sha }}
          echo "✅ Release $TAG created"

  # ─────────────────────────────────────────
  # STAGE 4: GENERATE DOCS → GITHUB WIKI
  # ─────────────────────────────────────────
  generate-docs:
    name: 📚 Generate Docs
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !inputs.test_deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate static docs (API, Schema)
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║    GENERATING STATIC DOCS            ║"
          echo "╚══════════════════════════════════════╝"
          node scripts/generate-docs.mjs

      - name: Generate AI docs (UX)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║    GENERATING AI-POWERED UX DOCS     ║"
          echo "║    (GitHub Copilot / Models API)     ║"
          echo "╚══════════════════════════════════════╝"
          node scripts/generate-ai-docs.mjs

      - name: Publish to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📚 Publishing docs to GitHub Wiki..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "$WIKI_URL" wiki-repo 2>/dev/null || {
            echo "⚠️  Wiki not initialized — creating first page"
            mkdir wiki-repo && cd wiki-repo && git init && git remote add origin "$WIKI_URL"
          }

          # Wiki Home page — clean landing
          printf '%s\n' \
            '# 🚲 DevEx Bike Shop — Wiki' \
            '' \
            '> Auto-generated documentation — updated on every push to main.' \
            '' \
            '---' \
            '' \
            '## 📚 Documentation' \
            '' \
            '| Page | Description |' \
            '|------|-------------|' \
            '| [[User Experience]] 🤖 | Customer journey, pages, design system |' \
            '| [[Architecture]] | Tech stack, project structure, security, CI/CD |' \
            '| [[API Reference]] | REST endpoints, auth, validation schemas |' \
            '| [[Database Schema]] | Tables, columns, relationships |' \
            '' \
            '---' \
            '' \
            '🤖 = AI-generated using GitHub Copilot / Models API' \
            > wiki-repo/Home.md

          # 1. AI-generated docs (GitHub Copilot) — human-facing first
          cp docs/USER-EXPERIENCE.md  wiki-repo/User-Experience.md
          cp docs/ARCHITECTURE.md     wiki-repo/Architecture.md

          # 2. Static docs (code-scanned) — technical reference
          cp docs/API.md              wiki-repo/API-Reference.md
          cp docs/SCHEMA.md           wiki-repo/Database-Schema.md

          # 3. Sidebar — controls wiki page order
          printf '%s\n' \
            '### 📚 Documentation' \
            '' \
            '- [[Home]]' \
            '- [[User Experience]] 🤖' \
            '- [[Architecture]]' \
            '- [[API Reference]]' \
            '- [[Database Schema]]' \
            > wiki-repo/_Sidebar.md

          cd wiki-repo
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️  No doc changes to publish"
          else
            git commit -m "docs: auto-update from ${GITHUB_SHA::7}"
            git push origin HEAD
            echo "✅ Wiki updated successfully"
          fi
