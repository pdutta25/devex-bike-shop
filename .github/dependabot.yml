version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "pdutta25"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    groups:
      # Group all minor/patch updates into a single PR
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
      # Major versions get individual PRs for review

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
    groups:
      # Group all GitHub Actions updates into one PR
      actions-all:
        patterns:
          - "*"
